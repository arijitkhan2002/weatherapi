<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(-45deg,#74ebd5,#ACB6E5,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:bg 10s infinite;
}

@keyframes bg {
    0%{background-position:0}
    50%{background-position:100%}
    100%{background-position:0}
}

.card {
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
}

.forecast {
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.forecast div {
    min-width:100px;
    background:rgba(255,255,255,0.3);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container mt-4 text-center">

    <h2>🌦 Check Weather</h2>

    <!-- Search -->
    <form method="GET">
        <input type="text" name="city" placeholder="Enter city" class="form-control w-50 mx-auto">
        <button type="submit" class="btn btn-primary mt-2">Search</button>
    </form>

    <!-- Auto Location -->
    <button onclick="getLocation()" class="btn btn-success mt-2">📍 Auto Location</button>

    <!-- Error -->
    {% if error %}
    <div class="alert alert-danger mt-3 w-50 mx-auto">
        {{ error }}
    </div>
    {% endif %}

    <!-- Weather -->
    {% if weather.temperature %}
    <div class="card mt-4 p-3 w-50 mx-auto">
        <h3>{{ weather.city }}</h3>
        <img src="http://openweathermap.org/img/w/{{ weather.icon }}.png">
        <h1>{{ weather.temperature }} °C</h1>
        <p class="text-capitalize">{{ weather.description }}</p>
    </div>
    {% endif %}

    <!-- Charts -->
    <div class="card mt-4 p-3">
        <h5>Temperature</h5>
        <canvas id="tempChart"></canvas>
    </div>

    <div class="card mt-4 p-3">
        <h5>Humidity</h5>
        <canvas id="humidityChart"></canvas>
    </div>

    <div class="card mt-4 p-3">
        <h5>Wind</h5>
        <canvas id="windChart"></canvas>
    </div>

    <!-- Forecast -->
    <div class="card mt-4 p-3">
        <h5>5-Day Forecast</h5>
        <div class="forecast">
            {% for d in forecast %}
            <div>
                {{ d.date }}<br>
                <img src="http://openweathermap.org/img/w/{{ d.icon }}.png"><br>
                {{ d.temp }}°C
            </div>
            {% endfor %}
        </div>
    </div>

</div>

<script>
function getLocation(){
    navigator.geolocation.getCurrentPosition(pos=>{
        window.location = `/?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`;
    });
}

new Chart(document.getElementById("tempChart"), {
    type:"line",
    data:{
        labels: {{ labels|safe }},
        datasets:[{data: {{ temp|safe }} }]
    }
});

new Chart(document.getElementById("humidityChart"), {
    type:"bar",
    data:{
        labels: {{ labels|safe }},
        datasets:[{data: {{ humidity|safe }} }]
    }
});

new Chart(document.getElementById("windChart"), {
    type:"line",
    data:{
        labels: {{ labels|safe }},
        datasets:[{data: {{ wind|safe }} }]
    }
});
</script>

</body>
</html>
